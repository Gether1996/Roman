name: masaze_vlcince

services:
  web:
    build: .
    command: gunicorn Roman.wsgi:application --workers 2 --bind 0.0.0.0:8000 --timeout 60 --access-logfile -
    ports:
      - "127.0.0.1:9000:8000"
    env_file:
      - .env
    environment:
      TZ: Europe/Bratislava
    restart: unless-stopped  