name: masaze_vlcince_dev

services:
  web:
    build: .
    # Runs migrations, collects static files (unhashed in dev), then starts live-reload server
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      # Mount source code so Python changes trigger auto-reload without rebuilding the image.
      # db.sqlite3 is also persisted on the host through this mount.
      - .:/app
    ports:
      - "127.0.0.1:9000:8000"
    env_file:
      - .env.dev
    environment:
      TZ: Europe/Bratislava
    restart: unless-stopped
